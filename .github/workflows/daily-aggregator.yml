name: Daily Node Aggregator

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r scripts/requirements.txt
      - name: Run aggregator
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/aggregate_nodes.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-report-${{ github.run_id }}
          path: output/
          retention-days: 7
